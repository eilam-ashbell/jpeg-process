<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inside JPEG — How JPEG Compression Works</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script defer src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fb;
      --bg-accent: #f0f4ff;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --accent-blue: #2563eb;
      --accent-blue-dark: #1d4ed8;
      --accent-blue-tint: #dbeafe;
      --border: #e2e8f0;
      --radius: 14px;
      --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 8px 32px rgba(0,0,0,.07);
      --scene-bg: radial-gradient(#f0f4ff, #ffffff);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      line-height: 1.6;
      margin: 0;
      overflow-x: hidden;
    }

    /* Typography */
    .title-page {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: clamp(2.6rem, 7vw, 5.2rem);
    }

    .title-section {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(1.7rem, 3.5vw, 2.6rem);
    }

    .title-card {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
    }

    .text-body {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 1rem;
    }

    .text-code {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 0.82em;
    }

    .text-code-bold {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.82em;
    }

    /* Section layout */
    .section-wrapper {
      width: 100%;
    }

    .section-wrapper--alt {
      background: var(--bg-secondary);
    }

    .section {
      max-width: 960px;
      margin: 0 auto;
      padding: 96px 24px;
      position: relative;
    }

    /* Demo card */
    .demo-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 24px;
    }

    /* Responsive grid */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 680px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    /* Reveal animation */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .reveal.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
      }
      /* 3D transitions disabled — simple fade-in only */
    }

    /* ── Data Size Bar ──────────────────────────────────────────────────── */
    #dataBar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 52px;
      z-index: 1000;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      cursor: pointer;
      overflow: visible;
      transition: height 0.2s ease, opacity 0.4s ease;
    }

    #dataBar:hover {
      height: 72px;
    }

    .databar-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      height: 52px;
      padding: 0 24px;
      max-width: 960px;
      margin: 0 auto;
      transition: height 0.2s ease;
    }

    #dataBar:hover .databar-inner {
      height: 72px;
    }

    .databar-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
      min-width: 160px;
      transition: color 0.3s;
    }

    .databar-track {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      min-width: 0;
    }

    .databar-fill {
      height: 100%;
      border-radius: 4px;
      width: 100%;
      background: #22c55e;
      transition: width 800ms cubic-bezier(0.4, 0, 0.2, 1), background-color 600ms ease;
    }

    .databar-size {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--text-primary);
      white-space: nowrap;
      min-width: 76px;
      text-align: right;
    }

    .databar-ratio {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent-blue);
      white-space: nowrap;
      min-width: 80px;
      text-align: right;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .databar-ratio.visible {
      opacity: 1;
    }

    @keyframes dataPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.015); }
      100% { transform: scale(1); }
    }

    .databar-pulse {
      animation: dataPulse 400ms ease;
    }

    /* Tooltip */
    .databar-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15,23,42,0.96);
      color: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 300px;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.28);
      font-size: 0.8rem;
      line-height: 1;
      z-index: 1010;
      pointer-events: none;
    }

    .databar-tooltip.visible {
      display: block;
      pointer-events: auto;
    }

    .databar-tooltip-title {
      font-weight: 700;
      font-size: 0.78rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .databar-tooltip-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .databar-tooltip-row:last-child {
      border-bottom: none;
    }

    .databar-tooltip-row.current {
      color: #60a5fa;
      font-weight: 600;
    }

    .databar-tooltip-row .tt-label {
      flex: 1;
    }

    .databar-tooltip-row .tt-size {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    @media (max-width: 680px) {
      #dataBar { height: 40px; }
      #dataBar:hover { height: 56px; }
      .databar-inner { height: 40px; padding: 0 12px; gap: 8px; }
      #dataBar:hover .databar-inner { height: 56px; }
      .databar-label { font-size: 0.72rem; min-width: 60px; }
      .databar-size { font-size: 0.78rem; min-width: 56px; }
      .databar-ratio { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .databar-fill { transition: none !important; }
      .databar-pulse { animation: none !important; }
    }

    /* ── Sidebar Navigation ─────────────────────────────────────────────── */
    .sidebar-tab {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 80px;
      background: var(--accent-blue);
      color: #fff;
      border: none;
      border-radius: 14px 0 0 14px;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 900;
      transition: background 0.15s, width 0.2s;
    }

    .sidebar-tab:hover {
      background: var(--accent-blue-dark);
      width: 36px;
    }

    .sidebar-tab-label {
      display: block;
      transform: rotate(-90deg);
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      pointer-events: none;
    }

    .sidebar-panel {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%) translateX(100%);
      width: 220px;
      max-height: calc(100vh - 80px);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 14px 0 0 14px;
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      z-index: 901;
      box-shadow: -4px 0 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .sidebar-panel.open {
      transform: translateY(-50%) translateX(0);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 0.88rem;
      flex-shrink: 0;
    }

    .sidebar-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.15rem;
      color: var(--text-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
      font-family: 'Inter', sans-serif;
    }

    .sidebar-close:hover {
      background: var(--border);
      color: var(--text-primary);
    }

    .sidebar-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar-progress-track {
      width: 3px;
      background: var(--border);
      flex-shrink: 0;
    }

    .sidebar-progress-fill {
      width: 100%;
      height: 0%;
      background: var(--accent-blue);
      transition: height 0.4s ease;
    }

    .sidebar-nav-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px 7px 10px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-primary);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background 0.1s;
      font-family: 'Inter', sans-serif;
      line-height: 1.3;
    }

    .sidebar-nav-item:hover {
      background: var(--bg-secondary);
    }

    .sidebar-nav-item:focus {
      outline: 2px solid var(--accent-blue);
      outline-offset: -2px;
    }

    .sidebar-nav-item.active {
      background: var(--accent-blue);
      color: #fff;
    }

    .sidebar-nav-item.active .nav-indicator {
      color: rgba(255,255,255,0.85);
    }

    .nav-indicator {
      font-size: 0.65rem;
      width: 12px;
      flex-shrink: 0;
      color: var(--text-muted);
      text-align: center;
    }

    .nav-icon {
      font-size: 0.88rem;
      flex-shrink: 0;
      width: 18px;
      text-align: center;
    }

    .nav-label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 680px) {
      .sidebar-panel.open {
        width: 100vw;
        transform: translateY(-50%) translateX(0);
        border-radius: 0;
      }
      .sidebar-nav-item {
        padding: 11px 16px;
        min-height: 48px;
        font-size: 0.92rem;
      }
      .sidebar-close {
        font-size: 1.4rem;
        padding: 4px 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .sidebar-panel { transition: none !important; }
      .sidebar-progress-fill { transition: none !important; }
    }

    /* ── Hero ──────────────────────────────────────────────────────────── */
    #hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-top: 80px;
      padding-bottom: 80px;
    }

    .hero-subtitle {
      color: var(--text-secondary);
      font-size: 1.15rem;
      max-width: 560px;
      margin: 12px auto 40px;
    }

    /* Upload zone */
    .upload-zone {
      width: 100%;
      max-width: 400px;
      min-height: 200px;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      padding: 32px 24px;
      user-select: none;
    }

    .upload-zone:hover {
      border-color: var(--accent-blue);
      background: var(--bg-accent);
    }

    .upload-zone.drag-over {
      border-color: var(--accent-blue);
      background: var(--bg-accent);
      transform: scale(1.02);
    }

    .upload-zone.error {
      border-color: #ef4444;
      background: #fef2f2;
    }

    .upload-icon {
      font-size: 2.2rem;
      line-height: 1;
    }

    .upload-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .upload-sublabel {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .upload-error-msg {
      color: #ef4444;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
    }

    .upload-zone.error .upload-error-msg {
      display: block;
    }

    .upload-zone.error .upload-icon,
    .upload-zone.error .upload-label,
    .upload-zone.error .upload-sublabel {
      display: none;
    }

    .privacy-note {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 12px;
    }

    /* Post-upload state */
    .hero-upload-state,
    .hero-result-state {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .hero-result-state {
      display: none;
    }

    .result-image-card {
      border: 3px solid #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      display: inline-block;
      max-width: 100%;
    }

    .result-image-card canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .result-dims {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .change-photo-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      padding: 6px 14px;
      transition: border-color 0.15s, color 0.15s;
    }

    .change-photo-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    /* Scroll cue */
    .scroll-cue {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-top: 8px;
      animation: scrollBounce 2s ease-in-out infinite;
      transition: opacity 0.4s;
    }

    .scroll-cue.visible {
      display: flex;
    }

    .scroll-cue-arrow {
      font-size: 1.2rem;
    }

    @keyframes scrollBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(8px); }
    }
  </style>
</head>
<body>

<main>
  <div class="section-wrapper">
    <section id="hero" class="section">
      <h1 class="title-page">Inside JPEG</h1>
      <p class="hero-subtitle">Scroll through the journey of a JPEG, step by step — using your own photo.</p>

      <!-- Upload state -->
      <div class="hero-upload-state" id="heroUploadState">
        <div class="upload-zone" id="uploadZone" role="button" tabindex="0" aria-label="Upload an image">
          <span class="upload-icon">📷</span>
          <span class="upload-label">Drop your photo here</span>
          <span class="upload-sublabel">or click to browse</span>
          <span class="upload-error-msg" id="uploadErrorMsg"></span>
        </div>
        <p class="privacy-note">Your photo never leaves your device. All processing happens in your browser.</p>
      </div>

      <!-- Result state (shown after upload) -->
      <div class="hero-result-state" id="heroResultState">
        <div class="result-image-card">
          <canvas id="resultCanvas"></canvas>
        </div>
        <p class="result-dims" id="resultDims"></p>
        <button class="change-photo-btn" id="changePhotoBtn">Change photo</button>
        <div class="scroll-cue" id="scrollCue">
          <span>Scroll down to begin</span>
          <span class="scroll-cue-arrow">↓</span>
        </div>
      </div>

      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-lens" class="section"><!-- Phase 04 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-bayer" class="section"><!-- Phase 04 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-raw" class="section"><!-- Phase 04 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-rgb" class="section"><!-- Phase 05 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-ycbcr" class="section"><!-- Phase 05 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-chroma" class="section"><!-- Phase 05 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-blocks" class="section"><!-- Phase 06 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-dct" class="section"><!-- Phase 06 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-quant" class="section"><!-- Phase 06 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-zigzag" class="section"><!-- Phase 07 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-rle" class="section"><!-- Phase 07 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-huffman" class="section"><!-- Phase 07 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-quality" class="section"><!-- Phase 08 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-compare" class="section"><!-- Phase 08 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-undo" class="section"><!-- Phase 08 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-summary" class="section"><!-- Phase 08 --></section>
  </div>
</main>

<!-- ── Data Size Bar ──────────────────────────────────────────────────────── -->
<div id="dataBar" role="status" aria-label="Current pipeline stage and file size" style="display:none">
  <div class="databar-inner" id="dataBarInner">
    <span class="databar-label" id="dataBarLabel">Raw sensor data</span>
    <div class="databar-track">
      <div class="databar-fill" id="dataBarFill"></div>
    </div>
    <span class="databar-size" id="dataBarSize" aria-live="polite">36.0 MB</span>
    <span class="databar-ratio" id="dataBarRatio"></span>
  </div>
  <div class="databar-tooltip" id="dataBarTooltip" role="dialog" aria-label="File size at each pipeline stage"></div>
</div>

<!-- ── Sidebar Navigation ─────────────────────────────────────────────────── -->
<button class="sidebar-tab" id="sidebarTab" aria-label="Open section navigation" aria-expanded="false" aria-controls="sidebarPanel" style="display:none">
  <span class="sidebar-tab-label">≡ Sections</span>
</button>
<div class="sidebar-panel" id="sidebarPanel" aria-hidden="true" style="display:none">
  <div class="sidebar-header">
    <span>§ Sections</span>
    <button class="sidebar-close" id="sidebarClose" aria-label="Close navigation">×</button>
  </div>
  <div class="sidebar-body">
    <div class="sidebar-progress-track">
      <div class="sidebar-progress-fill" id="sidebarProgressFill"></div>
    </div>
    <nav class="sidebar-nav-list" id="sidebarNavList" aria-label="Pipeline sections"></nav>
  </div>
</div>

<script>
  // ─── Global State ──────────────────────────────────────────────────────────
  const S = {
    img: null,           // ImageData — uploaded image (max 480px, padded to 8×8)
    w: 0,                // Image width
    h: 0,                // Image height
    origCanvas: null,    // HTMLCanvasElement — original uploaded image
    selBx: 0,            // Selected 8×8 block origin X (pixels)
    selBy: 0,            // Selected 8×8 block origin Y (pixels)
    block: null,         // { y: [], cb: [], cr: [] } — block channel arrays
    dctC: null,          // Float32Array — DCT coefficients for selected block
    quantC: null,        // Array — quantized coefficients
    zzSeq: null,         // Array — zigzag-ordered quantized coefficients
    rleSeq: null,        // Array — RLE-encoded sequence
    quality: 75,         // Current quality setting (1–100)
    scrollY: 0,          // Current window.scrollY
    sectionProgress: {}, // { sectionId: 0–1 } scroll progress per section
  };

  // ─── Animation pause flag ──────────────────────────────────────────────────
  let pageVisible = true;
  document.addEventListener('visibilitychange', () => {
    pageVisible = !document.hidden;
  });

  // ─── Scroll Progress ───────────────────────────────────────────────────────
  function updateScrollProgress() {
    S.scrollY = window.scrollY;
    const vh = window.innerHeight;
    document.querySelectorAll('.section-wrapper').forEach(wrapper => {
      const rect = wrapper.getBoundingClientRect();
      const section = wrapper.querySelector('.section');
      if (!section) return;
      const id = section.id;
      const progress = Math.max(0, Math.min(1,
        (vh - rect.top) / (vh + rect.height)
      ));
      S.sectionProgress[id] = progress;
    });
    requestAnimationFrame(updateScrollProgress);
  }
  requestAnimationFrame(updateScrollProgress);

  // ─── Transition progress helper ────────────────────────────────────────────
  function getTransitionProgress(fromId, toId) {
    const from = S.sectionProgress[fromId] ?? 0;
    const to = S.sectionProgress[toId] ?? 0;
    // Overlap zone: bottom 30% of fromId, top 30% of toId
    // from progress > 0.7 means we're in the bottom 30%
    const t = Math.max(0, Math.min(1, (from - 0.7) / 0.3));
    return t;
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  // ─── Scroll-triggered reveal ───────────────────────────────────────────────
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

  // ─── Hero Upload ────────────────────────────────────────────────────────────
  (function () {
    const uploadZone   = document.getElementById('uploadZone');
    const fileInput    = document.getElementById('fileInput');
    const errorMsg     = document.getElementById('uploadErrorMsg');
    const uploadState  = document.getElementById('heroUploadState');
    const resultState  = document.getElementById('heroResultState');
    const resultCanvas = document.getElementById('resultCanvas');
    const resultDims   = document.getElementById('resultDims');
    const changeBtn    = document.getElementById('changePhotoBtn');
    const scrollCue    = document.getElementById('scrollCue');

    // Open file picker on click / Enter / Space
    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
    });

    // Drag-and-drop
    uploadZone.addEventListener('dragover', e => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    changeBtn.addEventListener('click', () => {
      resultState.style.display = 'none';
      uploadState.style.display = 'flex';
      scrollCue.classList.remove('visible');
      fileInput.value = '';
    });

    // Hide scroll cue when user scrolls past hero
    window.addEventListener('scroll', () => {
      if (window.scrollY > window.innerHeight * 0.6) {
        scrollCue.style.opacity = '0';
      } else {
        scrollCue.style.opacity = '1';
      }
    }, { passive: true });

    function showError(msg) {
      uploadZone.classList.add('error');
      errorMsg.textContent = msg;
    }

    function clearError() {
      uploadZone.classList.remove('error');
      errorMsg.textContent = '';
    }

    function handleFile(file) {
      clearError();
      if (!file.type.startsWith('image/')) {
        showError('That file isn\'t an image. Please choose a photo.');
        return;
      }

      const reader = new FileReader();
      reader.onerror = () => showError('Failed to read the file. Please try another image.');
      reader.onload = e => processImage(e.target.result);
      reader.readAsDataURL(file);
    }

    function processImage(dataURL) {
      const img = new Image();
      img.onerror = () => showError('Image failed to load. Please try another file.');
      img.onload = () => {
        // 1. Scale to fit within 480×480 maintaining aspect ratio
        const MAX = 480;
        let w = img.naturalWidth;
        let h = img.naturalHeight;
        const scale = Math.min(MAX / w, MAX / h, 1);
        w = Math.round(w * scale);
        h = Math.round(h * scale);

        // 2. Pad to nearest 8×8 multiple
        const pw = Math.ceil(w / 8) * 8;
        const ph = Math.ceil(h / 8) * 8;

        // 3. Draw to canvas
        const canvas = document.createElement('canvas');
        canvas.width  = pw;
        canvas.height = ph;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, pw, ph);
        ctx.drawImage(img, 0, 0, w, h);

        // 4. Store in global state
        S.img        = ctx.getImageData(0, 0, pw, ph);
        S.w          = pw;
        S.h          = ph;
        S.origCanvas = canvas;

        // 5. Default selected block = center block
        S.selBx = Math.floor(pw / 16) * 8;
        S.selBy = Math.floor(ph / 16) * 8;

        // 6. Render result preview
        resultCanvas.width  = pw;
        resultCanvas.height = ph;
        resultCanvas.getContext('2d').drawImage(canvas, 0, 0);
        resultDims.textContent = `Your photo: ${pw} × ${ph} pixels`;

        // 7. Transition UI
        uploadState.style.display = 'none';
        resultState.style.display = 'flex';
        scrollCue.classList.add('visible');

        // 8. Notify other sections
        document.dispatchEvent(new CustomEvent('imageReady'));
      };
      img.src = dataURL;
    }
  }());

  // ─── Phase 3: Data Size Bar & Sidebar Navigation ────────────────────────────

  // Section metadata: id, bar label, nav label, icon, base size (MB at 12MP), bar %
  const SECTION_DATA = [
    { id: 'hero',      stageLabel: 'Raw sensor data',         shortLabel: 'Upload Your Photo',  icon: '📷', mobileLabel: 'Raw',     rawMB: 36,   pct: 100 },
    { id: 's-lens',    stageLabel: 'After demosaicing',        shortLabel: 'Light & Lens',       icon: '🔆', mobileLabel: 'Lens',     rawMB: 36,   pct: 100 },
    { id: 's-bayer',   stageLabel: 'Full RGB pixels',          shortLabel: 'Bayer Sensor',       icon: '🟩', mobileLabel: 'Bayer',    rawMB: 36,   pct: 100 },
    { id: 's-raw',     stageLabel: 'Full RGB pixels',          shortLabel: 'Raw Pixels',         icon: '🔍', mobileLabel: 'Raw',      rawMB: 36,   pct: 100 },
    { id: 's-rgb',     stageLabel: 'RGB channels',             shortLabel: 'RGB Channels',       icon: '🎨', mobileLabel: 'RGB',      rawMB: 36,   pct: 100 },
    { id: 's-ycbcr',   stageLabel: 'After YCbCr conversion',   shortLabel: 'YCbCr Space',        icon: '🌈', mobileLabel: 'YCbCr',    rawMB: 36,   pct: 100 },
    { id: 's-chroma',  stageLabel: 'After 4:2:0 subsampling',  shortLabel: 'Chroma Subsampling', icon: '⬇️', mobileLabel: 'Chroma',   rawMB: 18,   pct: 50  },
    { id: 's-blocks',  stageLabel: 'Divided into blocks',      shortLabel: '8×8 Blocks',         icon: '🧩', mobileLabel: 'Blocks',   rawMB: 18,   pct: 50  },
    { id: 's-dct',     stageLabel: 'After DCT',                shortLabel: 'DCT Transform',      icon: '〰️', mobileLabel: 'DCT',      rawMB: 18,   pct: 50  },
    { id: 's-quant',   stageLabel: 'After quantization',       shortLabel: 'Quantization',       icon: '✂️', mobileLabel: 'Quant',    rawMB: 3,    pct: 8   },
    { id: 's-zigzag',  stageLabel: 'After zigzag scan',        shortLabel: 'Zigzag Scan',        icon: '↗️', mobileLabel: 'Zigzag',   rawMB: 3,    pct: 8   },
    { id: 's-rle',     stageLabel: 'After RLE',                shortLabel: 'Run-Length Enc.',    icon: '🗜️', mobileLabel: 'RLE',      rawMB: 0.8,  pct: 2.2 },
    { id: 's-huffman', stageLabel: 'After Huffman coding',     shortLabel: 'Huffman Coding',     icon: '🌳', mobileLabel: 'Huffman',  rawMB: 0.3,  pct: 0.8 },
    { id: 's-quality', stageLabel: 'Live (quality-adjusted)',  shortLabel: 'Live Quality',       icon: '🎛️', mobileLabel: 'Quality',  rawMB: 0.3,  pct: 0.8 },
    { id: 's-compare', stageLabel: 'Compressed vs. original',  shortLabel: 'Comparison',         icon: '⟺',  mobileLabel: 'Compare',  rawMB: 0.3,  pct: 0.8 },
    { id: 's-undo',    stageLabel: 'Decoding (rebuilding)',    shortLabel: 'Undo JPEG',          icon: '🔄', mobileLabel: 'Undo',     rawMB: 36,   pct: 100 },
    { id: 's-summary', stageLabel: 'Final JPEG on disk',       shortLabel: 'Full Pipeline',      icon: '★',  mobileLabel: 'Summary',  rawMB: 0.3,  pct: 0.8 },
  ];

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function pctToColor(pct) {
    const green  = [34,  197, 94];
    const yellow = [234, 179, 8];
    const orange = [249, 115, 22];
    const red    = [239, 68,  68];
    let from, to, t;
    if (pct >= 50) {
      [from, to, t] = [yellow, green,  (pct - 50) / 50];
    } else if (pct >= 8) {
      [from, to, t] = [orange, yellow, (pct - 8)  / 42];
    } else {
      [from, to, t] = [red,    orange, Math.max(0, (pct - 0.8) / 7.2)];
    }
    const r = Math.round(from[0] + (to[0] - from[0]) * t);
    const g = Math.round(from[1] + (to[1] - from[1]) * t);
    const b = Math.round(from[2] + (to[2] - from[2]) * t);
    return `rgb(${r},${g},${b})`;
  }

  function formatSize(mb) {
    if (mb >= 1) return mb.toFixed(1) + ' MB';
    const kb = mb * 1024;
    return kb >= 100 ? Math.round(kb) + ' KB' : kb.toFixed(1) + ' KB';
  }

  function scaledMB(rawMB) {
    if (!S.w || !S.h) return rawMB;
    return rawMB * (S.w * S.h) / 12_000_000;
  }

  // ── Data Size Bar ─────────────────────────────────────────────────────────
  let _activeSection = null;
  let _counterAnimId = null;
  let _prevSizeMB = 36;
  let _tooltipOpen = false;

  function animateCounter(toMB) {
    const fromMB = _prevSizeMB;
    _prevSizeMB = toMB;
    if (_counterAnimId) cancelAnimationFrame(_counterAnimId);
    const el = document.getElementById('dataBarSize');
    const start = performance.now();
    const duration = 600;
    (function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const ease = 1 - Math.pow(1 - t, 3);
      el.textContent = formatSize(fromMB + (toMB - fromMB) * ease);
      if (t < 1) _counterAnimId = requestAnimationFrame(step);
    })(performance.now());
  }

  function updateDataBar(sectionId) {
    const data = SECTION_DATA.find(s => s.id === sectionId);
    if (!data) return;
    const prevData = SECTION_DATA.find(s => s.id === _activeSection);
    _activeSection = sectionId;

    const fill   = document.getElementById('dataBarFill');
    const label  = document.getElementById('dataBarLabel');
    const ratio  = document.getElementById('dataBarRatio');
    const inner  = document.getElementById('dataBarInner');
    const isMobile = window.innerWidth <= 680;

    label.textContent = isMobile ? data.mobileLabel : data.stageLabel;
    fill.style.width = data.pct + '%';
    fill.style.backgroundColor = pctToColor(data.pct);
    animateCounter(scaledMB(data.rawMB));

    // Compression ratio badge
    if (data.pct < 50) {
      const rawVal = scaledMB(36);
      const compVal = scaledMB(data.rawMB);
      const r = Math.round(rawVal / compVal);
      if (r > 1) {
        ratio.textContent = r + '× smaller';
        ratio.classList.add('visible');
      }
    } else {
      ratio.classList.remove('visible');
    }

    // Pulse on significant size change
    if (prevData && Math.abs(prevData.pct - data.pct) > 10) {
      inner.classList.remove('databar-pulse');
      void inner.offsetWidth;
      inner.classList.add('databar-pulse');
    }
  }

  function renderTooltip() {
    const tooltip = document.getElementById('dataBarTooltip');
    const rows = SECTION_DATA.map(sd => {
      const isCur = sd.id === _activeSection;
      return `<div class="databar-tooltip-row${isCur ? ' current' : ''}">
        <span class="tt-label">${sd.shortLabel}</span>
        <span class="tt-size">${formatSize(scaledMB(sd.rawMB))}</span>
      </div>`;
    });
    tooltip.innerHTML = `<div class="databar-tooltip-title">File size at each stage</div>${rows.join('')}`;
  }

  function initDataBar() {
    const bar     = document.getElementById('dataBar');
    const tooltip = document.getElementById('dataBarTooltip');

    bar.addEventListener('click', e => {
      if (e.target.closest('.databar-tooltip')) return;
      _tooltipOpen = !_tooltipOpen;
      if (_tooltipOpen) {
        renderTooltip();
        tooltip.classList.add('visible');
      } else {
        tooltip.classList.remove('visible');
      }
    });

    document.addEventListener('click', e => {
      if (_tooltipOpen && !bar.contains(e.target)) {
        _tooltipOpen = false;
        tooltip.classList.remove('visible');
      }
    });
  }

  // ── Sidebar Navigation ────────────────────────────────────────────────────
  let _sidebarOpen = false;
  const _visitedSections = new Set();

  function openSidebar() {
    _sidebarOpen = true;
    const tab   = document.getElementById('sidebarTab');
    const panel = document.getElementById('sidebarPanel');
    tab.setAttribute('aria-expanded', 'true');
    tab.setAttribute('aria-label', 'Close section navigation');
    panel.classList.add('open');
    panel.setAttribute('aria-hidden', 'false');
    const first = panel.querySelector('.sidebar-nav-item');
    if (first) first.focus();
  }

  function closeSidebar() {
    _sidebarOpen = false;
    const tab   = document.getElementById('sidebarTab');
    const panel = document.getElementById('sidebarPanel');
    tab.setAttribute('aria-expanded', 'false');
    tab.setAttribute('aria-label', 'Open section navigation');
    panel.classList.remove('open');
    panel.setAttribute('aria-hidden', 'true');
  }

  function updateSidebarActive(sectionId) {
    _visitedSections.add(sectionId);
    const idx = SECTION_DATA.findIndex(s => s.id === sectionId);
    SECTION_DATA.forEach((sd, i) => {
      const btn = document.getElementById('navItem-' + sd.id);
      const ind = document.getElementById('navInd-' + sd.id);
      if (!btn || !ind) return;
      if (sd.id === sectionId) {
        btn.classList.add('active');
        ind.textContent = '●';
      } else {
        btn.classList.remove('active');
        ind.textContent = _visitedSections.has(sd.id) ? '✓' : '○';
      }
    });
    const fill = document.getElementById('sidebarProgressFill');
    if (fill && idx >= 0) fill.style.height = ((idx + 1) / SECTION_DATA.length * 100) + '%';
  }

  function initSidebar() {
    const tab   = document.getElementById('sidebarTab');
    const panel = document.getElementById('sidebarPanel');
    const close = document.getElementById('sidebarClose');
    const list  = document.getElementById('sidebarNavList');

    // Inject nav items
    SECTION_DATA.forEach(sd => {
      const btn = document.createElement('button');
      btn.className = 'sidebar-nav-item';
      btn.id = 'navItem-' + sd.id;
      btn.setAttribute('data-section', sd.id);
      btn.innerHTML =
        `<span class="nav-indicator" id="navInd-${sd.id}">○</span>` +
        `<span class="nav-icon">${sd.icon}</span>` +
        `<span class="nav-label">${sd.shortLabel}</span>`;
      btn.addEventListener('click', () => {
        const target = document.getElementById(sd.id);
        if (target) target.scrollIntoView({ behavior: 'smooth' });
        closeSidebar();
      });
      list.appendChild(btn);
    });

    tab.addEventListener('click', () => _sidebarOpen ? closeSidebar() : openSidebar());
    close.addEventListener('click', () => { closeSidebar(); tab.focus(); });

    // Click outside
    document.addEventListener('click', e => {
      if (_sidebarOpen && !panel.contains(e.target) && e.target !== tab) closeSidebar();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if ((e.key === 'n' || e.key === 'N') && !e.ctrlKey && !e.metaKey && !e.altKey) {
        const tag = document.activeElement && document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        e.preventDefault();
        _sidebarOpen ? closeSidebar() : openSidebar();
      }
      if (e.key === 'Escape' && _sidebarOpen) {
        closeSidebar();
        tab.focus();
      }
      if (_sidebarOpen) {
        const items = Array.from(list.querySelectorAll('.sidebar-nav-item'));
        const idx = items.indexOf(document.activeElement);
        if (e.key === 'ArrowDown') { e.preventDefault(); items[Math.min(idx + 1, items.length - 1)]?.focus(); }
        if (e.key === 'ArrowUp')   { e.preventDefault(); items[Math.max(idx - 1, 0)]?.focus(); }
      }
    });

    // Focus trap
    panel.addEventListener('keydown', e => {
      if (e.key !== 'Tab') return;
      const focusable = Array.from(panel.querySelectorAll('button, [tabindex="0"]')).filter(el => !el.disabled);
      if (!focusable.length) return;
      const first = focusable[0], last = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    });
  }

  // ── Active section via IntersectionObserver ───────────────────────────────
  const _visibleSet = new Set();

  function initSectionObserver() {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => e.isIntersecting ? _visibleSet.add(e.target.id) : _visibleSet.delete(e.target.id));
      // Pick first visible section in document order
      for (const sd of SECTION_DATA) {
        if (_visibleSet.has(sd.id)) {
          if (sd.id !== _activeSection) {
            updateDataBar(sd.id);
            updateSidebarActive(sd.id);
          }
          break;
        }
      }
    }, { threshold: 0.35 });

    SECTION_DATA.forEach(sd => {
      const el = document.getElementById(sd.id);
      if (el) observer.observe(el);
    });
  }

  // ── Bootstrap on imageReady ───────────────────────────────────────────────
  document.addEventListener('imageReady', () => {
    const bar   = document.getElementById('dataBar');
    const tab   = document.getElementById('sidebarTab');
    const panel = document.getElementById('sidebarPanel');

    bar.style.display   = '';
    tab.style.display   = '';
    panel.style.display = '';
    document.body.style.paddingBottom = '60px';

    updateDataBar('hero');
    updateSidebarActive('hero');
    initDataBar();
    initSectionObserver();
  });

  // Init sidebar DOM (independent of image upload)
  initSidebar();
</script>
</body>
