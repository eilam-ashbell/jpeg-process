<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inside JPEG — How JPEG Compression Works</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script defer src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fb;
      --bg-accent: #f0f4ff;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --accent-blue: #2563eb;
      --accent-blue-dark: #1d4ed8;
      --accent-blue-tint: #dbeafe;
      --border: #e2e8f0;
      --radius: 14px;
      --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 8px 32px rgba(0,0,0,.07);
      --scene-bg: radial-gradient(#f0f4ff, #ffffff);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      line-height: 1.6;
      margin: 0;
      overflow-x: hidden;
    }

    /* Typography */
    .title-page {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: clamp(2.6rem, 7vw, 5.2rem);
    }

    .title-section {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(1.7rem, 3.5vw, 2.6rem);
    }

    .title-card {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
    }

    .text-body {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 1rem;
    }

    .text-code {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 0.82em;
    }

    .text-code-bold {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.82em;
    }

    /* Section layout */
    .section-wrapper {
      width: 100%;
    }

    .section-wrapper--alt {
      background: var(--bg-secondary);
    }

    .section {
      max-width: 960px;
      margin: 0 auto;
      padding: 96px 24px;
      position: relative;
    }

    /* Demo card */
    .demo-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 24px;
    }

    /* Responsive grid */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 680px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    /* Reveal animation */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .reveal.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
      }
      /* 3D transitions disabled — simple fade-in only */
    }

    /* ── Hero ──────────────────────────────────────────────────────────── */
    #hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-top: 80px;
      padding-bottom: 80px;
    }

    .hero-subtitle {
      color: var(--text-secondary);
      font-size: 1.15rem;
      max-width: 560px;
      margin: 12px auto 40px;
    }

    /* Upload zone */
    .upload-zone {
      width: 100%;
      max-width: 400px;
      min-height: 200px;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      padding: 32px 24px;
      user-select: none;
    }

    .upload-zone:hover {
      border-color: var(--accent-blue);
      background: var(--bg-accent);
    }

    .upload-zone.drag-over {
      border-color: var(--accent-blue);
      background: var(--bg-accent);
      transform: scale(1.02);
    }

    .upload-zone.error {
      border-color: #ef4444;
      background: #fef2f2;
    }

    .upload-icon {
      font-size: 2.2rem;
      line-height: 1;
    }

    .upload-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .upload-sublabel {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .upload-error-msg {
      color: #ef4444;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
    }

    .upload-zone.error .upload-error-msg {
      display: block;
    }

    .upload-zone.error .upload-icon,
    .upload-zone.error .upload-label,
    .upload-zone.error .upload-sublabel {
      display: none;
    }

    .privacy-note {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 12px;
    }

    /* Post-upload state */
    .hero-upload-state,
    .hero-result-state {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .hero-result-state {
      display: none;
    }

    .result-image-card {
      border: 3px solid #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      display: inline-block;
      max-width: 100%;
    }

    .result-image-card canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .result-dims {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .change-photo-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      padding: 6px 14px;
      transition: border-color 0.15s, color 0.15s;
    }

    .change-photo-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    /* Scroll cue */
    .scroll-cue {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-top: 8px;
      animation: scrollBounce 2s ease-in-out infinite;
      transition: opacity 0.4s;
    }

    .scroll-cue.visible {
      display: flex;
    }

    .scroll-cue-arrow {
      font-size: 1.2rem;
    }

    @keyframes scrollBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(8px); }
    }

    /* ── Data Size Bar ────────────────────────────────────────────────────── */
    #dataSizeBar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 52px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: none;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      transition: height 0.2s ease;
    }

    #dataSizeBar.show {
      display: flex;
    }

    #dataSizeBar:hover {
      height: 72px;
    }

    #dsbStageLabel {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      min-width: 140px;
    }

    #dsbBarTrack {
      flex-grow: 1;
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      overflow: hidden;
      min-width: 100px;
    }

    #dsbBarFill {
      height: 100%;
      background: #22c55e;
      transition: width 800ms cubic-bezier(0.4, 0, 0.2, 1), background-color 800ms cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 4px;
    }

    #dsbSizeLabel {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      min-width: 70px;
      text-align: right;
    }

    #dsbRatioBadge {
      font-size: 0.8rem;
      color: var(--text-muted);
      min-width: 80px;
      text-align: right;
    }

    /* Tooltip */
    #dsbTooltip {
      position: fixed;
      bottom: 62px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      z-index: 999;
      font-size: 0.85rem;
    }

    #dsbTooltipList {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    #dsbTooltipList li {
      padding: 4px 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    #dsbTooltipList li.current {
      color: #eab308;
      font-weight: 600;
    }

    /* Mobile */
    @media (max-width: 680px) {
      #dataSizeBar {
        height: 40px;
      }

      #dataSizeBar:hover {
        height: 48px;
      }

      #dsbStageLabel {
        min-width: 90px;
        font-size: 0.75rem;
      }

      #dsbSizeLabel {
        min-width: 60px;
        font-size: 0.8rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #dataSizeBar {
        transition: none;
      }

      #dsbBarFill {
        transition: none;
      }
    }

    /* ── Sidebar Navigation ───────────────────────────────────────────────── */
    #sidebarToggle {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      z-index: 900;
      background: var(--accent-blue);
      color: #fff;
      border-radius: 14px 0 0 14px;
      border: none;
      padding: 14px 8px;
      cursor: pointer;
      display: none;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }

    #sidebarToggle:hover {
      background: var(--accent-blue-dark);
    }

    #sidebarToggle.show {
      display: block;
    }

    #sidebarPanel {
      position: fixed;
      right: 0;
      top: 0;
      height: 100vh;
      width: 220px;
      z-index: 950;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      border-left: 1px solid var(--border);
      border-radius: 14px 0 0 14px;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      box-shadow: -1px 0 12px rgba(0, 0, 0, 0.08);
    }

    #sidebarPanel.open {
      transform: translateX(0);
    }

    #sidebarHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 0.95rem;
    }

    #sidebarClose {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-primary);
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.2s;
    }

    #sidebarClose:hover {
      background: var(--bg-secondary);
    }

    #sidebarProgress {
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 0%;
      background: var(--accent-blue);
      transition: height 0.15s ease;
      z-index: 1;
    }

    #sidebarList {
      list-style: none;
      margin: 0;
      padding: 0;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-left: 4px;
      padding-right: 8px;
      padding-top: 8px;
    }

    #sidebarList li {
      padding: 0;
      margin: 0;
    }

    #sidebarList button {
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #sidebarList button:hover {
      background: var(--bg-secondary);
    }

    #sidebarList button.active {
      background: var(--accent-blue);
      color: #fff;
      font-weight: 600;
    }

    #sidebarList button:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: -2px;
    }

    .sidebar-indicator {
      font-size: 0.8rem;
      min-width: 14px;
    }

    .sidebar-label {
      flex: 1;
    }

    /* Mobile */
    @media (max-width: 680px) {
      #sidebarToggle {
        padding: 12px 6px;
        font-size: 0.75rem;
      }

      #sidebarPanel {
        width: 100vw;
        border-radius: 0;
      }

      #sidebarList button {
        padding: 14px 14px;
        height: 48px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #sidebarToggle {
        transition: none;
      }

      #sidebarPanel {
        transition: none;
      }

      #sidebarProgress {
        transition: none;
      }

      #sidebarList button {
        transition: none;
      }
    }
  </style>
</head>
<body>

<main>
  <div class="section-wrapper">
    <section id="hero" class="section">
      <h1 class="title-page">Inside JPEG</h1>
      <p class="hero-subtitle">Scroll through the journey of a JPEG, step by step — using your own photo.</p>

      <!-- Upload state -->
      <div class="hero-upload-state" id="heroUploadState">
        <div class="upload-zone" id="uploadZone" role="button" tabindex="0" aria-label="Upload an image">
          <span class="upload-icon">📷</span>
          <span class="upload-label">Drop your photo here</span>
          <span class="upload-sublabel">or click to browse</span>
          <span class="upload-error-msg" id="uploadErrorMsg"></span>
        </div>
        <p class="privacy-note">Your photo never leaves your device. All processing happens in your browser.</p>
      </div>

      <!-- Result state (shown after upload) -->
      <div class="hero-result-state" id="heroResultState">
        <div class="result-image-card">
          <canvas id="resultCanvas"></canvas>
        </div>
        <p class="result-dims" id="resultDims"></p>
        <button class="change-photo-btn" id="changePhotoBtn">Change photo</button>
        <div class="scroll-cue" id="scrollCue">
          <span>Scroll down to begin</span>
          <span class="scroll-cue-arrow">↓</span>
        </div>
      </div>

      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-lens" class="section"><!-- Phase 04 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-bayer" class="section"><!-- Phase 04 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-raw" class="section"><!-- Phase 04 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-rgb" class="section"><!-- Phase 05 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-ycbcr" class="section"><!-- Phase 05 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-chroma" class="section"><!-- Phase 05 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-blocks" class="section"><!-- Phase 06 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-dct" class="section"><!-- Phase 06 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-quant" class="section"><!-- Phase 06 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-zigzag" class="section"><!-- Phase 07 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-rle" class="section"><!-- Phase 07 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-huffman" class="section"><!-- Phase 07 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-quality" class="section"><!-- Phase 08 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-compare" class="section"><!-- Phase 08 --></section>
  </div>
  <div class="section-wrapper section-wrapper--alt">
    <section id="s-undo" class="section"><!-- Phase 08 --></section>
  </div>
  <div class="section-wrapper">
    <section id="s-summary" class="section"><!-- Phase 08 --></section>
  </div>
</main>

<!-- Data Size Bar -->
<div id="dataSizeBar" role="status" aria-live="polite">
  <span id="dsbStageLabel">Raw sensor data</span>
  <div id="dsbBarTrack"><div id="dsbBarFill"></div></div>
  <span id="dsbSizeLabel">36.0 MB</span>
  <span id="dsbRatioBadge" hidden>—</span>
</div>

<!-- Data Size Bar Tooltip -->
<div id="dsbTooltip" hidden>
  <ul id="dsbTooltipList"></ul>
</div>

<!-- Sidebar Toggle -->
<div id="sidebarToggle" aria-label="Toggle sections navigation">≡ Sections</div>

<!-- Sidebar Navigation Panel -->
<nav id="sidebarPanel" aria-label="Sections navigation" hidden>
  <div id="sidebarHeader"><span>§ Sections</span><button id="sidebarClose">×</button></div>
  <div id="sidebarProgress"></div>
  <ul id="sidebarList" role="list"></ul>
</nav>

<script>
  // ─── Global State ──────────────────────────────────────────────────────────
  const S = {
    img: null,           // ImageData — uploaded image (max 480px, padded to 8×8)
    w: 0,                // Image width
    h: 0,                // Image height
    origCanvas: null,    // HTMLCanvasElement — original uploaded image
    selBx: 0,            // Selected 8×8 block origin X (pixels)
    selBy: 0,            // Selected 8×8 block origin Y (pixels)
    block: null,         // { y: [], cb: [], cr: [] } — block channel arrays
    dctC: null,          // Float32Array — DCT coefficients for selected block
    quantC: null,        // Array — quantized coefficients
    zzSeq: null,         // Array — zigzag-ordered quantized coefficients
    rleSeq: null,        // Array — RLE-encoded sequence
    quality: 75,         // Current quality setting (1–100)
    scrollY: 0,          // Current window.scrollY
    sectionProgress: {}, // { sectionId: 0–1 } scroll progress per section
  };

  // ─── Animation pause flag ──────────────────────────────────────────────────
  let pageVisible = true;
  document.addEventListener('visibilitychange', () => {
    pageVisible = !document.hidden;
  });

  // ─── Scroll Progress ───────────────────────────────────────────────────────
  function updateScrollProgress() {
    S.scrollY = window.scrollY;
    const vh = window.innerHeight;
    document.querySelectorAll('.section-wrapper').forEach(wrapper => {
      const rect = wrapper.getBoundingClientRect();
      const section = wrapper.querySelector('.section');
      if (!section) return;
      const id = section.id;
      const progress = Math.max(0, Math.min(1,
        (vh - rect.top) / (vh + rect.height)
      ));
      S.sectionProgress[id] = progress;
    });
    requestAnimationFrame(updateScrollProgress);
  }
  requestAnimationFrame(updateScrollProgress);

  // ─── Transition progress helper ────────────────────────────────────────────
  function getTransitionProgress(fromId, toId) {
    const from = S.sectionProgress[fromId] ?? 0;
    const to = S.sectionProgress[toId] ?? 0;
    // Overlap zone: bottom 30% of fromId, top 30% of toId
    // from progress > 0.7 means we're in the bottom 30%
    const t = Math.max(0, Math.min(1, (from - 0.7) / 0.3));
    return t;
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  // ─── Scroll-triggered reveal ───────────────────────────────────────────────
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

  // ─── Hero Upload ────────────────────────────────────────────────────────────
  (function () {
    const uploadZone   = document.getElementById('uploadZone');
    const fileInput    = document.getElementById('fileInput');
    const errorMsg     = document.getElementById('uploadErrorMsg');
    const uploadState  = document.getElementById('heroUploadState');
    const resultState  = document.getElementById('heroResultState');
    const resultCanvas = document.getElementById('resultCanvas');
    const resultDims   = document.getElementById('resultDims');
    const changeBtn    = document.getElementById('changePhotoBtn');
    const scrollCue    = document.getElementById('scrollCue');

    // Open file picker on click / Enter / Space
    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
    });

    // Drag-and-drop
    uploadZone.addEventListener('dragover', e => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    changeBtn.addEventListener('click', () => {
      resultState.style.display = 'none';
      uploadState.style.display = 'flex';
      scrollCue.classList.remove('visible');
      fileInput.value = '';
    });

    // Hide scroll cue when user scrolls past hero
    window.addEventListener('scroll', () => {
      if (window.scrollY > window.innerHeight * 0.6) {
        scrollCue.style.opacity = '0';
      } else {
        scrollCue.style.opacity = '1';
      }
    }, { passive: true });

    function showError(msg) {
      uploadZone.classList.add('error');
      errorMsg.textContent = msg;
    }

    function clearError() {
      uploadZone.classList.remove('error');
      errorMsg.textContent = '';
    }

    function handleFile(file) {
      clearError();
      if (!file.type.startsWith('image/')) {
        showError('That file isn\'t an image. Please choose a photo.');
        return;
      }

      const reader = new FileReader();
      reader.onerror = () => showError('Failed to read the file. Please try another image.');
      reader.onload = e => processImage(e.target.result);
      reader.readAsDataURL(file);
    }

    function processImage(dataURL) {
      const img = new Image();
      img.onerror = () => showError('Image failed to load. Please try another file.');
      img.onload = () => {
        // 1. Scale to fit within 480×480 maintaining aspect ratio
        const MAX = 480;
        let w = img.naturalWidth;
        let h = img.naturalHeight;
        const scale = Math.min(MAX / w, MAX / h, 1);
        w = Math.round(w * scale);
        h = Math.round(h * scale);

        // 2. Pad to nearest 8×8 multiple
        const pw = Math.ceil(w / 8) * 8;
        const ph = Math.ceil(h / 8) * 8;

        // 3. Draw to canvas
        const canvas = document.createElement('canvas');
        canvas.width  = pw;
        canvas.height = ph;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, pw, ph);
        ctx.drawImage(img, 0, 0, w, h);

        // 4. Store in global state
        S.img        = ctx.getImageData(0, 0, pw, ph);
        S.w          = pw;
        S.h          = ph;
        S.origCanvas = canvas;

        // 5. Default selected block = center block
        S.selBx = Math.floor(pw / 16) * 8;
        S.selBy = Math.floor(ph / 16) * 8;

        // 6. Render result preview
        resultCanvas.width  = pw;
        resultCanvas.height = ph;
        resultCanvas.getContext('2d').drawImage(canvas, 0, 0);
        resultDims.textContent = `Your photo: ${pw} × ${ph} pixels`;

        // 7. Transition UI
        uploadState.style.display = 'none';
        resultState.style.display = 'flex';
        scrollCue.classList.add('visible');

        // 8. Notify other sections
        document.dispatchEvent(new CustomEvent('imageReady'));
      };
      img.src = dataURL;
    }
  }());

  // ─── Phase 3: Persistent UI Components ────────────────────────────────────

  // Section configuration with compression data
  const SECTION_CONFIG = {
    hero:       { label: 'Raw sensor data',           pct: 1.00, color: '#22c55e' },
    's-lens':   { label: 'After demosaicing',        pct: 1.00, color: '#22c55e' },
    's-bayer':  { label: 'Full RGB pixels',          pct: 1.00, color: '#22c55e' },
    's-raw':    { label: 'Full RGB pixels',          pct: 1.00, color: '#22c55e' },
    's-rgb':    { label: 'RGB channels',             pct: 1.00, color: '#22c55e' },
    's-ycbcr':  { label: 'After YCbCr conversion',   pct: 1.00, color: '#22c55e' },
    's-chroma': { label: 'After 4:2:0 subsampling',  pct: 0.50, color: '#eab308' },
    's-blocks': { label: 'Divided into blocks',      pct: 0.50, color: '#eab308' },
    's-dct':    { label: 'After DCT',                pct: 0.50, color: '#eab308' },
    's-quant':  { label: 'After quantization',       pct: 0.08, color: '#f97316' },
    's-zigzag': { label: 'After zigzag scan',        pct: 0.08, color: '#f97316' },
    's-rle':    { label: 'After RLE',                pct: 0.022, color: '#ef4444' },
    's-huffman':{ label: 'After Huffman coding',     pct: 0.008, color: '#ef4444' },
    's-quality':{ label: 'Live (quality-adjusted)',  pct: 0.008, color: '#ef4444' },
    's-compare':{ label: 'Compressed vs. original', pct: 0.008, color: '#ef4444' },
    's-undo':   { label: 'Decoding (rebuilding)',    pct: 1.00, color: '#22c55e' },
    's-summary':{ label: 'Final JPEG on disk',       pct: 0.008, color: '#ef4444' },
  };

  const SECTIONS_LIST = [
    { id: 'hero',       label: 'Upload Your Photo', icon: '📷' },
    { id: 's-lens',     label: 'Light & Lens',      icon: '🔆' },
    { id: 's-bayer',    label: 'Bayer Sensor',      icon: '🟩' },
    { id: 's-raw',      label: 'Raw Pixels',        icon: '🔍' },
    { id: 's-rgb',      label: 'RGB Channels',      icon: '🎨' },
    { id: 's-ycbcr',    label: 'YCbCr Space',       icon: '🌈' },
    { id: 's-chroma',   label: 'Chroma Subsampling',icon: '⬇️' },
    { id: 's-blocks',   label: '8×8 Blocks',        icon: '🧩' },
    { id: 's-dct',      label: 'DCT Transform',     icon: '〰️' },
    { id: 's-quant',    label: 'Quantization',      icon: '✂️' },
    { id: 's-zigzag',   label: 'Zigzag Scan',       icon: '↗️' },
    { id: 's-rle',      label: 'Run-Length Enc.',   icon: '🗜️' },
    { id: 's-huffman',  label: 'Huffman Coding',    icon: '🌳' },
    { id: 's-quality',  label: 'Live Quality',      icon: '🎛️' },
    { id: 's-compare',  label: 'Comparison',        icon: '⟺' },
    { id: 's-undo',     label: 'Undo JPEG',         icon: '🔄' },
    { id: 's-summary',  label: 'Full Pipeline',     icon: '★' },
  ];

  // ─── Data Size Bar ────────────────────────────────────────────────────────
  (function() {
    const dataSizeBar = document.getElementById('dataSizeBar');
    const dsbStageLabel = document.getElementById('dsbStageLabel');
    const dsbBarFill = document.getElementById('dsbBarFill');
    const dsbSizeLabel = document.getElementById('dsbSizeLabel');
    const dsbRatioBadge = document.getElementById('dsbRatioBadge');
    const dsbTooltip = document.getElementById('dsbTooltip');
    const dsbTooltipList = document.getElementById('dsbTooltipList');

    let currentSectionId = 'hero';
    let isTooltipOpen = false;
    let sizeAnimationId = null;
    let displayedSize = 0;
    let targetSize = 0;
    const basePixels = 12_000_000;
    const baseSizes = {
      hero:       36000000, 's-lens':36000000, 's-bayer':36000000, 's-raw':36000000,
      's-rgb':    36000000, 's-ycbcr':36000000, 's-chroma':18000000, 's-blocks':18000000,
      's-dct':    18000000, 's-quant':3000000, 's-zigzag':3000000, 's-rle':800000,
      's-huffman':300000, 's-quality':300000, 's-compare':300000, 's-undo':36000000,
      's-summary':300000
    };

    function formatSize(bytes) {
      if (bytes >= 1000000) return (bytes / 1000000).toFixed(1) + ' MB';
      if (bytes >= 1000) return (bytes / 1000).toFixed(0) + ' KB';
      return Math.round(bytes) + ' B';
    }

    function animateSizeCounter(targetVal) {
      targetSize = targetVal;
      const startTime = performance.now();
      const duration = 600;
      const startVal = displayedSize;

      function animate(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        displayedSize = startVal + (targetVal - startVal) * progress;
        dsbSizeLabel.textContent = formatSize(displayedSize);

        if (progress < 1) {
          sizeAnimationId = requestAnimationFrame(animate);
        }
      }

      cancelAnimationFrame(sizeAnimationId);
      sizeAnimationId = requestAnimationFrame(animate);
    }

    function updateDataBar(sectionId) {
      if (currentSectionId === sectionId) return;
      currentSectionId = sectionId;

      const config = SECTION_CONFIG[sectionId];
      if (!config) return;

      dsbStageLabel.textContent = config.label;
      dsbBarFill.style.backgroundColor = config.color;
      dsbBarFill.style.width = (config.pct * 100) + '%';

      const scaleFactor = (S.w * S.h) / basePixels;
      const sectionSize = (baseSizes[sectionId] || 300000) * scaleFactor;
      animateSizeCounter(sectionSize);

      // Compression ratio (only show if < 50% of original)
      if (config.pct < 0.5) {
        const ratio = Math.round(1 / config.pct);
        dsbRatioBadge.textContent = ratio + '× smaller';
        dsbRatioBadge.removeAttribute('hidden');
      } else {
        dsbRatioBadge.setAttribute('hidden', '');
      }
    }

    function findActiveSectionId() {
      let maxProgress = -1;
      let activeId = 'hero';
      for (const [id, progress] of Object.entries(S.sectionProgress)) {
        if (progress > 0.1 && progress < 0.95 && progress > maxProgress) {
          maxProgress = progress;
          activeId = id;
        }
      }
      return activeId;
    }

    function toggleTooltip() {
      isTooltipOpen = !isTooltipOpen;
      if (isTooltipOpen) showTooltip();
      else dsbTooltip.setAttribute('hidden', '');
    }

    function showTooltip() {
      dsbTooltip.removeAttribute('hidden');
      dsbTooltipList.innerHTML = '';
      const scaleFactor = (S.w * S.h) / basePixels;

      for (const [sectionId, config] of Object.entries(SECTION_CONFIG)) {
        const li = document.createElement('li');
        if (sectionId === currentSectionId) li.classList.add('current');

        const sectionSize = (baseSizes[sectionId] || 300000) * scaleFactor;
        li.innerHTML = `<span>${config.label}</span><span>${formatSize(sectionSize)}</span>`;
        dsbTooltipList.appendChild(li);
      }
    }

    function hideTooltip() {
      isTooltipOpen = false;
      dsbTooltip.setAttribute('hidden', '');
    }

    // Update on scroll using rAF
    function updateDataBarOnScroll() {
      const activeId = findActiveSectionId();
      if (dataSizeBar.classList.contains('show')) {
        updateDataBar(activeId);
      }
      requestAnimationFrame(updateDataBarOnScroll);
    }

    // Tooltip click handlers
    dataSizeBar.addEventListener('click', toggleTooltip);
    document.addEventListener('click', (e) => {
      if (isTooltipOpen && !dataSizeBar.contains(e.target) && !dsbTooltip.contains(e.target)) {
        hideTooltip();
      }
    });

    // Show on imageReady
    document.addEventListener('imageReady', () => {
      dataSizeBar.classList.add('show');
      const activeId = findActiveSectionId();
      updateDataBar(activeId);
      updateDataBarOnScroll();
    });

    // Hide when changing photo
    document.addEventListener('change-photo', () => {
      dataSizeBar.classList.remove('show');
      hideTooltip();
    });
  }());

  // ─── Sidebar Navigation ───────────────────────────────────────────────────
  (function() {
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarPanel = document.getElementById('sidebarPanel');
    const sidebarClose = document.getElementById('sidebarClose');
    const sidebarList = document.getElementById('sidebarList');
    const sidebarProgress = document.getElementById('sidebarProgress');
    const sidebarHeader = document.getElementById('sidebarHeader');

    let isOpen = false;
    let visitedSections = new Set();
    let currentActiveSectionId = null;
    let focusedItemIndex = 0;
    const items = [];

    // Build sidebar items
    function buildSidebarItems() {
      sidebarList.innerHTML = '';
      items.length = 0;

      SECTIONS_LIST.forEach((section, idx) => {
        const li = document.createElement('li');
        const button = document.createElement('button');
        button.setAttribute('data-section-id', section.id);
        button.setAttribute('role', 'menuitem');

        const indicator = document.createElement('span');
        indicator.className = 'sidebar-indicator';
        indicator.textContent = '○';

        const label = document.createElement('span');
        label.className = 'sidebar-label';
        label.textContent = section.label;

        const icon = document.createElement('span');
        icon.textContent = section.icon;

        button.appendChild(indicator);
        button.appendChild(icon);
        button.appendChild(label);

        button.addEventListener('click', () => {
          const target = document.getElementById(section.id);
          if (target) {
            target.scrollIntoView({ behavior: 'smooth' });
            visitedSections.add(section.id);
            updateSidebarItems();
            close();
          }
        });

        button.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            focusedItemIndex = (focusedItemIndex + 1) % items.length;
            items[focusedItemIndex].button.focus();
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            focusedItemIndex = (focusedItemIndex - 1 + items.length) % items.length;
            items[focusedItemIndex].button.focus();
          } else if (e.key === 'Enter') {
            e.preventDefault();
            button.click();
          }
        });

        li.appendChild(button);
        sidebarList.appendChild(li);

        items.push({
          id: section.id,
          button: button,
          indicator: indicator,
          element: document.getElementById(section.id)
        });
      });
    }

    function updateSidebarItems() {
      items.forEach((item) => {
        if (item.id === currentActiveSectionId) {
          item.button.classList.add('active');
        } else {
          item.button.classList.remove('active');
        }

        const indicator = item.indicator;
        if (item.id === currentActiveSectionId) {
          indicator.textContent = '●';
        } else if (visitedSections.has(item.id)) {
          indicator.textContent = '✓';
        } else {
          indicator.textContent = '○';
        }
      });

      // Update progress bar
      const visitedPercent = (visitedSections.size / items.length) * 100;
      sidebarProgress.style.height = visitedPercent + '%';
    }

    function open() {
      if (isOpen) return;
      isOpen = true;
      sidebarPanel.classList.add('open');
      focusedItemIndex = items.findIndex(item => item.id === currentActiveSectionId);
      if (focusedItemIndex >= 0) {
        setTimeout(() => items[focusedItemIndex].button.focus(), 100);
      }
    }

    function close() {
      if (!isOpen) return;
      isOpen = false;
      sidebarPanel.classList.remove('open');
      sidebarToggle.focus();
    }

    function toggle() {
      if (isOpen) close();
      else open();
    }

    // Setup active section observer
    const sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          const sectionId = entry.target.id;
          currentActiveSectionId = sectionId;
          visitedSections.add(sectionId);
          updateSidebarItems();
        }
      });
    }, { threshold: 0.4 });

    document.querySelectorAll('.section').forEach(section => {
      sectionObserver.observe(section);
    });

    // Event listeners
    sidebarToggle.addEventListener('click', toggle);
    sidebarClose.addEventListener('click', close);

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (e.key === 'n' || e.key === 'N') {
        toggle();
      } else if (e.key === 'Escape' && isOpen) {
        close();
      }
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (isOpen && !sidebarPanel.contains(e.target) && !sidebarToggle.contains(e.target)) {
        close();
      }
    });

    // Focus trap in panel when open
    document.addEventListener('keydown', (e) => {
      if (!isOpen || e.key !== 'Tab') return;

      const focusableElements = sidebarPanel.querySelectorAll('button');
      if (focusableElements.length === 0) return;

      const firstElement = focusableElements[0];
      const lastElement = focusableElements[focusableElements.length - 1];
      const activeElement = document.activeElement;

      if (e.shiftKey) {
        if (activeElement === firstElement) {
          e.preventDefault();
          lastElement.focus();
        }
      } else {
        if (activeElement === lastElement) {
          e.preventDefault();
          firstElement.focus();
        }
      }
    });

    // Show on imageReady
    document.addEventListener('imageReady', () => {
      sidebarToggle.classList.add('show');
      buildSidebarItems();
      currentActiveSectionId = 'hero';
      visitedSections.add('hero');
      updateSidebarItems();
    });

    // Hide when changing photo
    document.addEventListener('change-photo', () => {
      sidebarToggle.classList.remove('show');
      sidebarPanel.classList.remove('open');
      isOpen = false;
      visitedSections.clear();
    });
  }());

  // Dispatch change-photo event when changing photo
  (function() {
    const changeBtn = document.getElementById('changePhotoBtn');
    const originalClickHandler = changeBtn.onclick;
    changeBtn.addEventListener('click', () => {
      document.dispatchEvent(new CustomEvent('change-photo'));
    });
  }());
</script>
